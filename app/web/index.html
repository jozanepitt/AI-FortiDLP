<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FortiDLP Agent</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        padding: 2rem;
        max-width: 860px;
        margin-inline: auto;
        line-height: 1.5;
      }
      h1 {
        margin-top: 0;
        font-size: 1.5rem;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        margin-block: 1rem;
      }
      select,
      input,
      button,
      textarea {
        font: inherit;
        padding: 0.5rem 0.75rem;
        border-radius: 0.375rem;
        border: 1px solid #888;
        background: transparent;
        color: inherit;
      }
      textarea {
        width: 100%;
        min-height: 4rem;
        resize: vertical;
      }
      button {
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      .answer {
        white-space: pre-wrap;
        padding: 1rem;
        border: 1px solid #888;
        border-radius: 0.5rem;
        min-height: 3rem;
      }
      details {
        margin-top: 0.75rem;
      }
      pre {
        overflow-x: auto;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h1>FortiDLP Agent</h1>
    <p>
      Ask an operational question about your FortiDLP tenant, or pick a
      canned query from the dropdown.
    </p>

    <div class="row">
      <select id="canned-select">
        <option value="">-- canned queries --</option>
      </select>
      <button id="canned-run">Run</button>
    </div>

    <div>
      <textarea
        id="question"
        placeholder="e.g. Which devices are unhealthy right now and why?"
      ></textarea>
      <div class="row">
        <button id="ask-btn">Ask</button>
      </div>
    </div>

    <div id="answer" class="answer"></div>
    <details id="trace-wrap" hidden>
      <summary>Tool trace</summary>
      <pre id="trace"></pre>
    </details>

    <script src="/static/app.js"></script>
  </body>
</html>
